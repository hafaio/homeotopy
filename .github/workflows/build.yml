# Continuous integration: lint, type-check, and test on every push and PR to
# main. Also reused as the release gate via workflow_call (see release.yml).
name: build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_call:

jobs:
  # Lint, type-check, and test across the supported Python versions. Also
  # invoked via workflow_call as the release gate, so this is the single
  # source of truth for what "passing CI" means.
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --locked
      - name: Check ruff format
        run: uv run ruff format --check
      - name: Check with ruff
        run: uv run ruff check
      - name: Run pyright
        run: uv run pyright
      - name: Test with pytest
        run: uv run pytest
